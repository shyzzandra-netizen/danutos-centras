<!DOCTYPE html>
<html lang="lt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Danutos dovanų koordinavimo centras</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

<header>

  <div class="flowers">🌸</div>

  <h1>Danutos dovanų koordinavimo centras</h1>

  <h2>37 geriau nei 36.</h2>

  <p>
    Nežinai, ką dovanoti Danutai? Nu tai prašom – viskas čia surašyta.
    Išsirink, ką nori dovanoti, ir būtinai paspausk „Rezervuoti“,
    kad paskui nebūtų trijų vienodų dovanų. Tvarka turi būti.
  </p>

</header>

<main id="gift-list">
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

  <div id="gift-modal" class="modal">

  <div class="modal-content">

    <span class="close" onclick="closeGift()">×</span>

    <img id="modal-image">

    <h2 id="modal-title"></h2>

    <p id="modal-description"></p>

    <p id="modal-price"></p>

    <a id="modal-link" target="_blank">
      Pažiūrėti dovaną
    </a>

    <button id="modal-reserve">
      Rezervuoti
    </button>

  </div>

</div>
  
</body>

</html>
